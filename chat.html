<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Samsung 2025</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<header>
  <button onclick="resetear()" class="logo-btn">S</button>
  <h1>Asistente Samsung 2025</h1>
</header>

<div class="container">

  <!-- PASO 1 -->
  <div id="paso1">
    <h2>¿Sobre qué producto quieres consultar?</h2>
    <p>Selecciona un modelo para empezar a hacer preguntas.</p>

    <input id="buscador" type="text"
      placeholder="Buscar modelo..."
      oninput="filtrarProductos()">

    <div id="lista-productos">
      <p class="loading">Cargando productos...</p>
    </div>
  </div>

  <!-- PASO 2 -->
  <div id="paso2">
    <div id="producto-header">
      <span id="producto-nombre">Producto</span>
      <button id="cambiar-btn" onclick="cambiarProducto()">← Cambiar producto</button>
    </div>

    <div id="chat"></div>

    <div id="form-chat">
      <input id="input" type="text" placeholder="Pregunta sobre este producto..." />
      <button id="enviar-btn" onclick="preguntar()">Enviar</button>
    </div>
  </div>

</div>

<!-- JS -->
<script src="./js/app.js"></script>
</body>
</html>
